services:
  grafana:
    extends:
      file: .config/docker-compose-base.yaml
      service: grafana
    environment:
      # Local embedding for test-harness.html: allow the dashboard to load in an
      # iframe with no login wall. Do NOT use these in a public instance.
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Admin'
      GF_AUTH_BASIC_ENABLED: 'false'
      GF_SECURITY_ALLOW_EMBEDDING: 'true'
      # Let the Grafana session cookie work inside a cross-site iframe.
      GF_SECURITY_COOKIE_SAMESITE: 'none'
